services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: moments
      POSTGRES_PASSWORD: moments_dev
      POSTGRES_DB: moments
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moments"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
