<!doctype html>
<html lang="zh-CN" data-overlayscrollbars-initialize>
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>近况</title>

    <!-- Theme FOUT prevention: apply .dark before CSS paints -->
    <script>
      (function () {
        try {
          var s = JSON.parse(localStorage.getItem('moments-theme') || '{}');
          var pref = s.state && s.state.theme;
          var dark = pref === 'dark'
            ? true
            : pref === 'light'
            ? false
            : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>

    <!-- Google Fonts: Inter (Latin) + Noto Sans SC (Chinese) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body data-overlayscrollbars-initialize>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
